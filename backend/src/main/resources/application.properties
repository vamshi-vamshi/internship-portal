# ===== Server =====
server.port=${PORT:8080}

# ===== PostgreSQL Database =====
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/internship_portal}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== Connection Pool =====
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:InternshipPortal2024SecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ===== CORS allowed origins =====
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ===== AI Chatbot =====
app.ai.api-key=${AI_API_KEY:}
app.ai.enabled=${AI_ENABLED:false}

# ===== Admin Setup =====
app.admin.email=${ADMIN_EMAIL:admin@portal.com}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.name=${ADMIN_NAME:Admin User}

# ===== Logging =====
logging.level.com.internshipportal=INFO
logging.level.org.springframework.security=WARN

# ===== Pagination =====
app.pagination.default-size=9
